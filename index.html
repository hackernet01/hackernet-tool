<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIM Database Checker - HackerNet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .content {
            padding: 30px;
        }
        .auth-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .social-verify {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #e0e0e0;
        }
        .social-link {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: white;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            border: 1px solid #ddd;
        }
        .checkbox-group {
            margin: 15px 0;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .uid-box {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .uid-number {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #667eea;
            font-family: monospace;
        }
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }
        .message-success { background: #d4edda; color: #155724; }
        .message-error { background: #f8d7da; color: #721c24; }
        .tool-container { display: none; }
        .search-type {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 10px;
        }
        .type-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .type-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .record-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .record-field {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
        }
        .field-label {
            font-weight: 700;
            color: #667eea;
            min-width: 80px;
        }
        .credit {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .channel-link {
            color: #25D366;
            text-decoration: none;
            background: #f0faf2;
            padding: 4px 12px;
            border-radius: 40px;
        }
        @media (max-width: 600px) {
            .content { padding: 20px; }
            .uid-number { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📱 SIM & CNIC Database Checker</h1>
                <p>Secure Access System</p>
            </div>
            <div class="content">
                <div id="authSection">
                    <div class="auth-container">
                        <div id="messageBox" class="message"></div>
                        
                        <div class="social-verify">
                            <h3>✅ Verify & Get Access</h3>
                            <div>
                                <a href="https://whatsapp.com/channel/0029VajXwL6AYlUQ0YPBzA2U" target="_blank" class="social-link">📢 WhatsApp Channel</a>
                                <a href="https://chat.whatsapp.com/G9xjwadhp1rF0BtGdtauC7" target="_blank" class="social-link">👥 Group 1</a>
                                <a href="https://chat.whatsapp.com/GapAf9ZYcUS1qyP8UQDWxL" target="_blank" class="social-link">👥 Group 2</a>
                                <a href="https://youtube.com/@itshackernet?si=2ou5IZ279g5ULMc8" target="_blank" class="social-link">▶️ YouTube</a>
                            </div>
                            <div class="checkbox-group">
                                <label>
                                    <input type="checkbox" id="verifySocial" onchange="toggleRegister()">
                                    ✅ I have joined all groups & subscribed
                                </label>
                            </div>
                        </div>

                        <div id="registerForm">
                            <div class="form-group">
                                <label>👤 Your Name</label>
                                <input type="text" id="userName" placeholder="Enter your name">
                            </div>
                            <button class="btn" id="registerBtn" onclick="requestUID()" disabled>🔑 Request UID</button>
                        </div>

                        <div style="text-align: center; margin: 20px 0;"><hr><span style="background:white;padding:0 10px;">OR</span></div>

                        <div class="form-group">
                            <label>🔐 Enter Your UID</label>
                            <input type="text" id="uidInput" placeholder="Enter 6-digit UID" maxlength="6">
                            <button class="btn btn-secondary" style="margin-top:10px;" onclick="verifyUID()">✅ Verify & Access</button>
                        </div>

                        <div class="credit">
                            <a href="https://whatsapp.com/channel/0029VajXwL6AYlUQ0YPBzA2U" target="_blank" class="channel-link">📲 Join WhatsApp Channel</a>
                        </div>
                    </div>
                </div>

                <div id="toolSection" class="tool-container">
                    <div id="userInfo" style="background:#e8f0fe;padding:12px;border-radius:10px;margin-bottom:20px;">
                        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;">
                            <span>✅ <strong>Access Active</strong></span>
                            <span>📅 Expires: <span id="expiryDate">-</span></span>
                            <span>🆔 UID: <span id="currentUID">-</span></span>
                        </div>
                    </div>

                    <div class="search-type">
                        <button class="type-btn active" onclick="setSearchType('phone', event)">📞 Phone Number</button>
                        <button class="type-btn" onclick="setSearchType('cnic', event)">🆔 CNIC Number</button>
                    </div>

                    <div class="input-group">
                        <label id="inputLabel">📞 Phone Number</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchInput" placeholder="Enter number (e.g., 3001234567)">
                            <button onclick="checkQuery()">🔍 Search</button>
                        </div>
                    </div>

                    <div class="loader" id="loader"><div class="spinner"></div><p>Fetching data...</p></div>
                    <div id="result" style="display:none;"></div>
                    <div class="credit">Powered by HackerNet 😈🔥</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const DATABASE_API = 'https://famofc.site/api/database.php';
        let currentSearchType = 'phone';
        let currentUID = null;

        async function getUserIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return 'unknown'; }
        }

        async function requestUID() {
            const name = document.getElementById('userName').value.trim();
            const socialVerified = document.getElementById('verifySocial').checked;
            
            if (!socialVerified) { showMessage('Please verify social media first', 'error'); return; }
            if (!name) { showMessage('Please enter your name', 'error'); return; }
            
            const ip = await getUserIP();
            const uid = Math.floor(100000 + Math.random() * 900000).toString();
            
            try {
                const res = await fetch(`${API_BASE}/request.js`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, name, ip })
                });
                const data = await res.json();
                
                if (data.success) {
                    showMessage(`✅ Request submitted! Your UID: <strong>${uid}</strong><br>Send this to admin for approval.`, 'success');
                    const uidBox = document.createElement('div');
                    uidBox.className = 'uid-box';
                    uidBox.innerHTML = `<strong>📌 Your UID:</strong><div class="uid-number">${uid}</div><small>Share with admin to activate</small>`;
                    const regForm = document.getElementById('registerForm');
                    const oldBox = regForm.querySelector('.uid-box');
                    if(oldBox) oldBox.remove();
                    regForm.appendChild(uidBox);
                }
            } catch(e) { showMessage('Network error', 'error'); }
        }

        async function verifyUID() {
            const uid = document.getElementById('uidInput').value.trim();
            if (!uid || uid.length !== 6) { showMessage('Enter valid 6-digit UID', 'error'); return; }
            
            try {
                const res = await fetch(`${API_BASE}/check.js?uid=${uid}`);
                const data = await res.json();
                
                if (data.valid) {
                    currentUID = uid;
                    grantAccess(uid, data);
                } else {
                    showMessage(data.reason === 'expired' ? 'UID expired. Request new one.' : 'Invalid UID', 'error');
                }
            } catch(e) { showMessage('Error verifying UID', 'error'); }
        }

        function grantAccess(uid, userData) {
            const expiryDate = new Date(userData.expiry);
            sessionStorage.setItem('hackernet_session', JSON.stringify({ uid, expiry: userData.expiry }));
            
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('toolSection').style.display = 'block';
            document.getElementById('currentUID').innerText = uid;
            document.getElementById('expiryDate').innerText = expiryDate.toLocaleDateString();
        }

        function checkSession() {
            const session = sessionStorage.getItem('hackernet_session');
            if (session) {
                const data = JSON.parse(session);
                if (new Date(data.expiry) > new Date()) {
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('toolSection').style.display = 'block';
                    document.getElementById('currentUID').innerText = data.uid;
                    document.getElementById('expiryDate').innerText = new Date(data.expiry).toLocaleDateString();
                    currentUID = data.uid;
                    return true;
                }
            }
            return false;
        }

        function toggleRegister() {
            document.getElementById('registerBtn').disabled = !document.getElementById('verifySocial').checked;
        }

        function setSearchType(type, event) {
            currentSearchType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            if(event?.target) event.target.classList.add('active');
            const label = document.getElementById('inputLabel');
            const input = document.getElementById('searchInput');
            if(type === 'phone') {
                label.innerHTML = '📞 Phone Number';
                input.placeholder = 'Enter number (e.g., 3001234567)';
            } else {
                label.innerHTML = '🆔 CNIC Number';
                input.placeholder = 'Enter CNIC (e.g., 1234512345671)';
            }
        }

        async function checkQuery() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { showToolMessage('Enter search query', 'error'); return; }
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                // Log search to Telegram
                const ip = await getUserIP();
                await fetch(`${API_BASE}/log.js`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: currentUID, query, type: currentSearchType, ip })
                });
                
                const res = await fetch(`${DATABASE_API}?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                if (data.success && data.data?.records) {
                    displayResult(data.data);
                } else {
                    showToolMessage('No records found', 'error');
                }
            } catch(e) {
                showToolMessage('Failed to fetch data', 'error');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            let html = `<div style="background:#f8f9fa;border-radius:15px;padding:20px;">`;
            data.records.forEach(record => {
                html += `<div class="record-item">
                    <div class="record-field"><span class="field-label">👤 Name:</span><span>${escapeHtml(record.full_name || 'N/A')}</span></div>
                    <div class="record-field"><span class="field-label">📞 Phone:</span><span>${escapeHtml(record.phone || 'N/A')}</span></div>
                    <div class="record-field"><span class="field-label">🆔 CNIC:</span><span>${escapeHtml(record.cnic || 'N/A')}</span></div>
                    <div class="record-field"><span class="field-label">📍 Address:</span><span>${escapeHtml(record.address || 'N/A')}</span></div>
                </div>`;
            });
            html += `</div>`;
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
        }

        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = msg;
            box.className = `message message-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function showToolMessage(msg, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="message message-${type}" style="display:block">${msg}</div>`;
            resultDiv.style.display = 'block';
            setTimeout(() => resultDiv.style.display = 'none', 3000);
        }

        function escapeHtml(text) {
            if(!text) return 'N/A';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(!checkSession()) {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('toolSection').style.display = 'none';
            }
        });
    </script>
</body>
</html>
