<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIM Database - HackerNet</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto}
        .card{background:rgba(255,255,255,0.95);border-radius:25px;overflow:hidden}
        .header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center}
        .header h1{font-size:28px;margin-bottom:10px}
        .content{padding:30px}
        .auth-container{max-width:500px;margin:0 auto}
        .form-group{margin-bottom:20px}
        .form-group input{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px}
        .btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:12px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;width:100%}
        .btn-secondary{background:linear-gradient(135deg,#f093fb,#f5576c)}
        .social-verify{background:#f8f9fa;border-radius:15px;padding:20px;margin:20px 0;border:2px solid #e0e0e0}
        .social-link{display:inline-block;margin:8px;padding:8px 16px;background:white;border-radius:10px;text-decoration:none;color:#333;border:1px solid #ddd;font-size:14px}
        .approval-group-btn{display:block;background:linear-gradient(135deg,#25D366,#128C7E);color:white;text-align:center;padding:12px;border-radius:50px;text-decoration:none;font-weight:bold;margin:15px 0}
        .checkbox-group{margin:15px 0}
        .checkbox-group label{display:flex;align-items:center;gap:10px;cursor:pointer}
        .uid-box{background:linear-gradient(135deg,#667eea20,#764ba220);border:2px dashed #667eea;border-radius:15px;padding:20px;text-align:center;margin:20px 0}
        .uid-number{font-size:32px;font-weight:bold;letter-spacing:5px;color:#667eea;font-family:monospace}
        .loader{display:none;text-align:center;padding:20px}
        .spinner{border:3px solid #f3f3f3;border-top:3px solid #667eea;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .message{padding:12px;border-radius:10px;margin:15px 0;display:none}
        .message-success{background:#d4edda;color:#155724}
        .message-error{background:#f8d7da;color:#721c24}
        .message-info{background:#d1ecf1;color:#0c5460}
        .tool-container{display:none}
        .search-type{display:flex;gap:10px;margin-bottom:20px;background:#f0f0f0;padding:5px;border-radius:10px}
        .type-btn{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-weight:600}
        .type-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
        .input-wrapper{display:flex;gap:10px;flex-wrap:wrap}
        input{flex:1;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px}
        .record-item{background:white;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
        .record-field{margin-bottom:10px;display:flex;flex-wrap:wrap}
        .field-label{font-weight:700;color:#667eea;min-width:80px}
        .credit{text-align:center;margin-top:20px;font-size:12px;color:#666;border-top:1px solid #eee;padding-top:15px}
        .user-info{background:#e8f0fe;padding:12px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;flex-wrap:wrap}
        @media(max-width:600px){.content{padding:20px}.uid-number{font-size:24px}}
    </style>
</head>
<body>
<div class="container">
<div class="card">
<div class="header"><h1>📱 SIM & CNIC Database Checker</h1><p>Secure Access System</p></div>
<div class="content">
<div id="authSection">
<div class="auth-container">
<div id="messageBox" class="message"></div>
<a href="https://chat.whatsapp.com/Lh0EHoaFj6H3ZwKg9ePNzn" target="_blank" class="approval-group-btn">📲 JOIN APPROVAL GROUP ON WHATSAPP</a>
<div class="social-verify">
<h3>✅ Verify & Get Access</h3>
<div>
<a href="https://whatsapp.com/channel/0029VajXwL6AYlUQ0YPBzA2U" target="_blank" class="social-link">📢 Channel</a>
<a href="https://chat.whatsapp.com/G9xjwadhp1rF0BtGdtauC7" target="_blank" class="social-link">👥 Group 1</a>
<a href="https://chat.whatsapp.com/GapAf9ZYcUS1qyP8UQDWxL" target="_blank" class="social-link">👥 Group 2</a>
<a href="https://youtube.com/@itshackernet" target="_blank" class="social-link">▶️ YouTube</a>
</div>
<div class="checkbox-group"><label><input type="checkbox" id="verifySocial" onchange="toggleReg()"> ✅ I have joined all groups & subscribed</label></div>
</div>
<div id="regForm"><input type="text" id="userName" placeholder="Your Full Name"><button class="btn" id="regBtn" onclick="requestUID()" disabled style="margin-top:15px">🔑 Request UID</button></div>
<div style="text-align:center;margin:20px 0"><hr><span style="background:white;padding:0 10px">OR</span></div>
<input type="text" id="uidInput" placeholder="Enter 6-digit UID" maxlength="6">
<button class="btn btn-secondary" style="margin-top:10px" onclick="verifyUID()">✅ Verify & Access</button>
<div class="credit">Powered by HackerNet 😈🔥</div>
</div>
</div>
<div id="toolSection" class="tool-container">
<div class="user-info"><span>✅ Access Active</span><span>📅 Expires: <span id="expiryDate">-</span></span><span>🆔 UID: <span id="currentUID">-</span></span></div>
<div class="search-type"><button class="type-btn active" onclick="setType('phone',event)">📞 Phone</button><button class="type-btn" onclick="setType('cnic',event)">🆔 CNIC</button></div>
<div class="input-wrapper"><input type="text" id="searchInput" placeholder="Enter number"><button onclick="searchDB()">🔍 Search</button></div>
<div class="loader" id="loader"><div class="spinner"></div><p>Searching...</p></div>
<div id="result" style="display:none"></div>
<div class="credit">Powered by HackerNet 😈🔥<br><br><a href="https://chat.whatsapp.com/Lh0EHoaFj6H3ZwKg9ePNzn" target="_blank" style="color:#25D366;text-decoration:none;font-weight:bold">📲 Join Approval Group</a></div>
</div>
</div>
</div>
</div>

<script>
const BOT_TOKEN='8201380928:AAHaYoyJeIQyev7WM9DSlkvYi1Gl2zmByDw';
const ADMIN_ID='6552396222';
const DB_API='https://famofc.site/api/database.php';
let searchType='phone',currentUID=null;

async function getIP(){try{let r=await fetch('https://api.ipify.org?format=json'),d=await r.json();return d.ip}catch(e){return'unknown'}}
function sendMsg(m){fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:ADMIN_ID,text:m})}).catch(e=>console.log(e))}

function getIPReq(){let s=localStorage.getItem('ip_requests');return s?JSON.parse(s):{}}
function saveIPReq(r){localStorage.setItem('ip_requests',JSON.stringify(r))}

async function requestUID(){
    let name=document.getElementById('userName').value.trim();
    if(!document.getElementById('verifySocial').checked){showMsg('Verify social media first','error');return}
    if(!name){showMsg('Enter name','error');return}
    let ip=await getIP(),reqs=getIPReq();
    if(reqs[ip]){showMsg(`❌ IP already requested UID: ${reqs[ip].uid}`,'error');return}
    let uid=Math.floor(100000+Math.random()*900000).toString();
    reqs[ip]={uid,name,ip,time:new Date().toISOString()};
    saveIPReq(reqs);
    sendMsg(`🔔 NEW REQUEST\nUID: ${uid}\nName: ${name}\nIP: ${ip}`);
    showMsg(`✅ UID: ${uid}\nSend to admin for approval`,'success');
    let box=document.createElement('div');box.className='uid-box';box.innerHTML=`<strong>Your UID:</strong><div class="uid-number">${uid}</div><small>Send to admin</small>`;
    let old=document.getElementById('regForm').querySelector('.uid-box');if(old)old.remove();
    document.getElementById('regForm').appendChild(box);
}

async function verifyUID(){
    let uid=document.getElementById('uidInput').value.trim();
    if(!uid||uid.length!==6){showMsg('Enter 6-digit UID','error');return}
    showMsg('Checking...','info');
    try{
        let r=await fetch(`/api/check.js?uid=${uid}`),d=await r.json();
        if(d.valid){
            currentUID=uid;
            let exp=new Date(d.expiry),left=Math.ceil((exp-new Date())/(1000*60*60*24));
            localStorage.setItem('session',JSON.stringify({uid,name:d.name,expiry:d.expiry}));
            document.getElementById('authSection').style.display='none';
            document.getElementById('toolSection').style.display='block';
            document.getElementById('currentUID').innerText=uid;
            document.getElementById('expiryDate').innerHTML=`${exp.toLocaleDateString()} (${left} days left)`;
            let ip=await getIP();
            sendMsg(`✅ ACCESS GRANTED\nUID: ${uid}\nName: ${d.name}\nIP: ${ip}`);
        }else{showMsg(`❌ ${d.message}`,'error')}
    }catch(e){showMsg('Error checking UID','error')}
}

function checkSession(){
    let s=localStorage.getItem('session');
    if(s){
        let d=JSON.parse(s);
        if(new Date(d.expiry)>new Date()){
            document.getElementById('authSection').style.display='none';
            document.getElementById('toolSection').style.display='block';
            document.getElementById('currentUID').innerText=d.uid;
            document.getElementById('expiryDate').innerText=new Date(d.expiry).toLocaleDateString();
            currentUID=d.uid;
            return true;
        }
    }
    return false;
}

async function searchDB(){
    let q=document.getElementById('searchInput').value.trim();
    if(!q){showToolMsg('Enter query','error');return}
    document.getElementById('loader').style.display='block';
    document.getElementById('result').style.display='none';
    let ip=await getIP();
    sendMsg(`🔍 SEARCH\nUID: ${currentUID}\nQuery: ${q}\nType: ${searchType}\nIP: ${ip}`);
    try{
        let r=await fetch(`${DB_API}?q=${encodeURIComponent(q)}`),d=await r.json();
        if(d.success&&d.data?.records?.length>0){displayResult(d.data)}else{showToolMsg('No records','error')}
    }catch(e){showToolMsg('Database error','error')}
    finally{document.getElementById('loader').style.display='none'}
}

function displayResult(d){
    let html='<div style="background:#f8f9fa;border-radius:15px;padding:20px">';
    d.records.forEach(r=>{html+=`<div class="record-item"><div class="record-field"><span class="field-label">👤 Name:</span><span>${escapeHtml(r.full_name||r.name||'N/A')}</span></div><div class="record-field"><span class="field-label">📞 Phone:</span><span>${escapeHtml(r.phone||r.mobile||'N/A')}</span></div><div class="record-field"><span class="field-label">🆔 CNIC:</span><span>${escapeHtml(r.cnic||'N/A')}</span></div><div class="record-field"><span class="field-label">📍 Address:</span><span>${escapeHtml(r.address||'N/A')}</span></div></div>`});
    html+='</div>';
    document.getElementById('result').innerHTML=html;
    document.getElementById('result').style.display='block';
}

function toggleReg(){document.getElementById('regBtn').disabled=!document.getElementById('verifySocial').checked}
function setType(t,e){searchType=t;document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));if(e?.target)e.target.classList.add('active');let l=document.getElementById('inputLabel'),inp=document.getElementById('searchInput');if(t==='phone'){l.innerHTML='📞 Phone Number';inp.placeholder='Enter number'}else{l.innerHTML='🆔 CNIC Number';inp.placeholder='Enter CNIC'}}
function showMsg(m,t){let b=document.getElementById('messageBox');b.innerHTML=m;b.className=`message message-${t}`;b.style.display='block';setTimeout(()=>b.style.display='none',5000)}
function showToolMsg(m,t){let r=document.getElementById('result');r.innerHTML=`<div class="message message-${t}" style="display:block">${m}</div>`;r.style.display='block';setTimeout(()=>r.style.display='none',3000)}
function escapeHtml(t){if(!t)return'N/A';let d=document.createElement('div');d.textContent=t;return d.innerHTML}

document.addEventListener('DOMContentLoaded',()=>{if(!checkSession()){document.getElementById('authSection').style.display='block';document.getElementById('toolSection').style.display='none'}});
document.getElementById('searchInput').addEventListener('keypress',e=>{if(e.key==='Enter')searchDB()});
document.getElementById('uidInput').addEventListener('keypress',e=>{if(e.key==='Enter')verifyUID()});
</script>
</body>
</html>
