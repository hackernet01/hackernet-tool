<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HackerNet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            margin-bottom: 20px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-box h3 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #667eea;
        }
        .status-active {
            color: #4caf50;
            font-weight: bold;
        }
        .status-expired {
            color: #f44336;
            font-weight: bold;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 2px;
        }
        .btn-approve {
            background: #4caf50;
            color: white;
        }
        .btn-revoke {
            background: #f44336;
            color: white;
        }
        .btn-refresh {
            background: #667eea;
            color: white;
            padding: 10px 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .input-group input, .input-group select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .input-group input {
            flex: 1;
            min-width: 150px;
        }
        .popup-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .popup-success {
            background: #4caf50;
        }
        .popup-error {
            background: #f44336;
        }
        .popup-info {
            background: #2196f3;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .admin-key-input {
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 10px;
            width: 300px;
            margin-right: 10px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            th, td { font-size: 12px; padding: 8px; }
            .header { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 HackerNet Admin Panel</h1>
            <div>
                <button class="btn-refresh" onclick="loadAllData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="card">
            <h2>🔑 Admin Authentication</h2>
            <input type="password" id="adminKey" class="admin-key-input" placeholder="Enter Admin Key">
            <button class="btn btn-approve" onclick="authenticate()">Login</button>
        </div>

        <div id="adminContent" style="display: none;">
            <div class="stats-grid" id="statsGrid"></div>

            <div class="card">
                <h2>👥 Approve New UID</h2>
                <div class="input-group">
                    <input type="text" id="approveUID" placeholder="UID (e.g., 123456)" maxlength="6">
                    <input type="text" id="approveName" placeholder="User Name">
                    <select id="approveDays">
                        <option value="1">1 Day</option>
                        <option value="7">7 Days</option>
                        <option value="30" selected>30 Days</option>
                        <option value="90">3 Months (90 days)</option>
                        <option value="365">1 Year (365 days)</option>
                    </select>
                    <button class="btn btn-approve" onclick="approveUID()">✅ Approve UID</button>
                </div>
            </div>

            <div class="card">
                <h2>📋 All Approved UIDs</h2>
                <div class="table-container">
                    <table id="uidsTable">
                        <thead>
                            <tr><th>UID</th><th>Name</th><th>Days</th><th>Expiry</th><th>Status</th><th>Actions</th>
                        </thead>
                        <tbody id="uidsTableBody">
                            <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="popup"></div>

    <script>
        let adminAuthenticated = false;

        function showPopup(message, type) {
            const popup = document.getElementById('popup');
            popup.innerHTML = `<div class="popup-message popup-${type}">${message}</div>`;
            setTimeout(() => {
                popup.innerHTML = '';
            }, 3000);
        }

        async function authenticate() {
            const key = document.getElementById('adminKey').value;
            if (key === 'hackernet123') {
                adminAuthenticated = true;
                document.getElementById('adminContent').style.display = 'block';
                showPopup('✅ Login Successful! Welcome Admin.', 'success');
                loadAllData();
                setInterval(loadAllData, 10000);
            } else {
                showPopup('❌ Invalid Admin Key!', 'error');
            }
        }

        async function loadAllData() {
            if (!adminAuthenticated) return;
            await Promise.all([loadUIDs(), loadStats()]);
        }

        async function loadUIDs() {
            try {
                const res = await fetch(`/api/list.js?adminKey=hackernet123`);
                const data = await res.json();
                const tbody = document.getElementById('uidsTableBody');
                
                if (!data.uids || data.uids.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No approved UIDs yet</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                data.uids.forEach(uid => {
                    const expiry = new Date(uid.expiry);
                    const isActive = expiry > new Date();
                    const daysLeft = Math.ceil((expiry - new Date()) / (1000 * 60 * 60 * 24));
                    
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><strong>${uid.uid}</strong></td>
                        <td>${escapeHtml(uid.name)}</td>
                        <td>${uid.days || '-'}</td>
                        <td>${expiry.toLocaleString()} ${!isActive ? '<span style="color:red">(Expired)</span>' : `<span style="color:green">(${daysLeft} days left)</span>`}</td>
                        <td class="${isActive ? 'status-active' : 'status-expired'}">${isActive ? '✅ Active' : '❌ Expired'}</td>
                        <td><button class="btn btn-revoke" onclick="revokeUID('${uid.uid}')">Revoke</button></td>
                    `;
                });
            } catch (error) {
                console.error('Error loading UIDs:', error);
                document.getElementById('uidsTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center">Error loading data</td></tr>';
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`/api/stats.js`);
                const data = await res.json();
                const statsGrid = document.getElementById('statsGrid');
                statsGrid.innerHTML = `
                    <div class="stat-box"><h3>${data.activeUsers || 0}</h3><p>Active Users</p></div>
                    <div class="stat-box"><h3>${data.totalUsers || 0}</h3><p>Total UIDs</p></div>
                    <div class="stat-box"><h3>${data.totalSearches || 0}</h3><p>Total Searches</p></div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function approveUID() {
            const uid = document.getElementById('approveUID').value.trim();
            const name = document.getElementById('approveName').value.trim();
            const days = parseInt(document.getElementById('approveDays').value);
            
            if (!uid) {
                showPopup('❌ Please enter a UID', 'error');
                return;
            }
            
            if (uid.length !== 6) {
                showPopup('❌ UID must be 6 digits', 'error');
                return;
            }
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerHTML = 'Approving... <span class="loading"></span>';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/approve.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        uid: uid, 
                        name: name || 'User', 
                        days: days, 
                        adminKey: 'hackernet123' 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showPopup(`✅ UID ${uid} approved successfully for ${days} days!`, 'success');
                    document.getElementById('approveUID').value = '';
                    document.getElementById('approveName').value = '';
                    loadAllData();
                } else {
                    showPopup(`❌ Approval failed: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showPopup('❌ Network error. Please try again.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function revokeUID(uid) {
            if (!confirm(`⚠️ Are you sure you want to revoke UID: ${uid}?\nUser will lose access immediately.`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/revoke.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: uid, adminKey: 'hackernet123' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showPopup(`✅ UID ${uid} has been revoked!`, 'success');
                    loadAllData();
                } else {
                    showPopup(`❌ Revoke failed: ${data.error}`, 'error');
                }
            } catch (error) {
                showPopup('❌ Network error. Please try again.', 'error');
            }
        }

        function escapeHtml(text) {
            if (!text) return 'N/A';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
    </html>
