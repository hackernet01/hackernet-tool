<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HackerNet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            margin-bottom: 20px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-box h3 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #667eea;
        }
        .status-active {
            color: #4caf50;
            font-weight: bold;
        }
        .status-expired {
            color: #f44336;
            font-weight: bold;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 2px;
        }
        .btn-approve {
            background: #4caf50;
            color: white;
        }
        .btn-revoke {
            background: #f44336;
            color: white;
        }
        .btn-refresh {
            background: #667eea;
            color: white;
            padding: 10px 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .input-group input, .input-group select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .input-group input {
            flex: 1;
            min-width: 150px;
        }
        .popup-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .popup-success { background: #4caf50; }
        .popup-error { background: #f44336; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .login-box {
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #667eea;
            border-radius: 10px;
        }
        .admin-key-input {
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 10px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.5s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 HackerNet Admin Panel</h1>
            <button class="btn-refresh" onclick="loadAllData()">🔄 Refresh</button>
        </div>

        <div id="loginSection" class="login-box">
            <div class="card">
                <h2>🔑 Admin Login</h2>
                <input type="password" id="adminKey" class="admin-key-input" placeholder="Enter Admin Key">
                <button class="btn btn-approve" onclick="authenticate()" style="width:100%">Login</button>
            </div>
        </div>

        <div id="adminContent" style="display: none;">
            <div class="stats-grid" id="statsGrid"></div>

            <div class="card">
                <h2>✅ Approve New UID</h2>
                <div class="input-group">
                    <input type="text" id="approveUID" placeholder="UID (6 digits)" maxlength="6">
                    <input type="text" id="approveName" placeholder="User Name">
                    <select id="approveDays">
                        <option value="1">1 Day</option>
                        <option value="7">7 Days</option>
                        <option value="30" selected>30 Days</option>
                        <option value="90">3 Months (90 days)</option>
                        <option value="365">1 Year (365 days)</option>
                    </select>
                    <button class="btn btn-approve" id="approveBtn" onclick="approveUID()">✅ Approve UID</button>
                </div>
            </div>

            <div class="card">
                <h2>📋 All Approved UIDs</h2>
                <div style="overflow-x: auto;">
                    <table id="uidsTable">
                        <thead>
                            <tr><th>UID</th><th>Name</th><th>Days</th><th>Expiry</th><th>Status</th><th>Actions</th>
                        </thead>
                        <tbody id="uidsTableBody">
                            <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>🌐 IP Request Logs</h2>
                <div style="overflow-x: auto;">
                    <table id="ipLogsTable">
                        <thead>
                            <tr><th>IP Address</th><th>UID</th><th>Name</th><th>Time</th>
                        </thead>
                        <tbody id="ipLogsBody">
                            <tr><td colspan="4" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="popup"></div>

    <script>
        const ADMIN_PASSWORD = 'hackernet123';
        let adminAuthenticated = false;

        function showPopup(message, type) {
            const popup = document.getElementById('popup');
            popup.innerHTML = `<div class="popup-message popup-${type}">${message}</div>`;
            setTimeout(() => popup.innerHTML = '', 3000);
        }

        function authenticate() {
            const key = document.getElementById('adminKey').value;
            if (key === ADMIN_PASSWORD) {
                adminAuthenticated = true;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                showPopup('✅ Login Successful!', 'success');
                loadAllData();
                setInterval(loadAllData, 10000);
            } else {
                showPopup('❌ Invalid Admin Key!', 'error');
            }
        }

        function getIPRequests() {
            const stored = localStorage.getItem('hackernet_ip_requests');
            return stored ? JSON.parse(stored) : {};
        }

        async function loadAllData() {
            if (!adminAuthenticated) return;
            await loadUIDs();
            loadStats();
            loadIPLogs();
        }

        async function loadUIDs() {
            try {
                const response = await fetch('/api/list.js');
                const data = await response.json();
                const tbody = document.getElementById('uidsTableBody');
                
                if (!data.uids || data.uids.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No approved UIDs yet</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                data.uids.forEach(uid => {
                    const expiry = new Date(uid.expiry);
                    const isActive = expiry > new Date();
                    const daysLeft = Math.ceil((expiry - new Date()) / (1000 * 60 * 60 * 24));
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><strong>${uid.uid}</strong></td>
                        <td>${escapeHtml(uid.name)}</td>
                        <td>${uid.days}</td>
                        <td>${expiry.toLocaleString()} ${!isActive ? '<span style="color:red">(Expired)</span>' : `<span style="color:green">(${daysLeft} days left)</span>`}</td>
                        <td class="${isActive ? 'status-active' : 'status-expired'}">${isActive ? '✅ Active' : '❌ Expired'}</td>
                        <td><button class="btn btn-revoke" onclick="revokeUID('${uid.uid}')">Revoke</button></td>
                    `;
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('uidsTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center">Error loading data</td></tr>';
            }
        }

        function loadIPLogs() {
            const ipRequests = getIPRequests();
            const tbody = document.getElementById('ipLogsBody');
            const requests = Object.values(ipRequests);
            
            if (requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">No IP requests yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            requests.forEach(req => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${req.ip}</td>
                    <td><strong>${req.uid}</strong></td>
                    <td>${escapeHtml(req.name)}</td>
                    <td>${new Date(req.timestamp).toLocaleString()}</td>
                `;
            });
        }

        function loadStats() {
            const ipRequests = getIPRequests();
            const requestsCount = Object.keys(ipRequests).length;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-box"><h3 id="activeCount">-</h3><p>Active Users</p></div>
                <div class="stat-box"><h3 id="totalCount">-</h3><p>Total UIDs</p></div>
                <div class="stat-box"><h3>${requestsCount}</h3><p>Total Requests</p></div>
            `;
            
            // Update counts from API
            fetch('/api/list.js')
                .then(res => res.json())
                .then(data => {
                    const activeCount = data.uids.filter(u => new Date(u.expiry) > new Date()).length;
                    document.getElementById('activeCount').innerText = activeCount;
                    document.getElementById('totalCount').innerText = data.uids.length;
                })
                .catch(err => console.error(err));
        }

        async function approveUID() {
            const uid = document.getElementById('approveUID').value.trim();
            const name = document.getElementById('approveName').value.trim();
            const days = parseInt(document.getElementById('approveDays').value);
            
            if (!uid || uid.length !== 6) {
                showPopup('❌ Enter valid 6-digit UID', 'error');
                return;
            }
            
            const btn = document.getElementById('approveBtn');
            const originalText = btn.innerText;
            btn.innerHTML = 'Approving... <span class="loading"></span>';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/approve.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        uid: uid, 
                        name: name || 'User', 
                        days: days, 
                        adminKey: 'hackernet123' 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showPopup(`✅ UID ${uid} approved for ${days} days!`, 'success');
                    document.getElementById('approveUID').value = '';
                    document.getElementById('approveName').value = '';
                    loadAllData();
                } else {
                    showPopup(`❌ Failed: ${data.error}`, 'error');
                }
            } catch (err) {
                showPopup('❌ Network error', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function revokeUID(uid) {
            if (!confirm(`⚠️ Revoke UID ${uid}? User will lose access.`)) return;
            
            try {
                const response = await fetch('/api/revoke.js', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: uid, adminKey: 'hackernet123' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showPopup(`✅ UID ${uid} revoked!`, 'success');
                    loadAllData();
                } else {
                    showPopup(`❌ Revoke failed`, 'error');
                }
            } catch (err) {
                showPopup('❌ Network error', 'error');
            }
        }

        function escapeHtml(text) {
            if (!text) return 'N/A';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
