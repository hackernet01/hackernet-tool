<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HackerNet</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:25px;border-radius:20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .card{background:white;border-radius:20px;padding:25px;margin-bottom:20px}
        .card h2{margin-bottom:20px;color:#333;border-left:4px solid #667eea;padding-left:15px}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-box{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px;border-radius:15px;text-align:center}
        .stat-box h3{font-size:32px;margin-bottom:5px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #ddd}
        th{background:#f8f9fa;color:#667ea}
        .status-active{color:#4caf50;font-weight:bold}
        .status-expired{color:#f44336;font-weight:bold}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin:2px}
        .btn-approve{background:#4caf50;color:white}
        .btn-revoke{background:#f44336;color:white}
        .btn-refresh{background:#667eea;color:white;padding:10px 20px}
        .input-group{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap}
        .input-group input,.input-group select{padding:10px;border:2px solid #ddd;border-radius:8px}
        .input-group input{flex:1;min-width:150px}
        .popup-message{position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:10px;color:white;font-weight:bold;z-index:1000;animation:slideIn 0.3s}
        .popup-success{background:#4caf50}
        .popup-error{background:#f44336}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .login-box{max-width:400px;margin:50px auto}
        .admin-key-input{padding:12px;border:2px solid #667eea;border-radius:10px;width:100%;margin-bottom:10px}
        .loading{display:inline-block;width:16px;height:16px;border:2px solid white;border-top:2px solid transparent;border-radius:50%;animation:spin 0.5s linear infinite;margin-left:8px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="container">
<div class="header"><h1>🔐 HackerNet Admin Panel</h1><button class="btn-refresh" onclick="loadData()">🔄 Refresh</button></div>
<div id="login" class="login-box"><div class="card"><h2>🔑 Admin Login</h2><input type="password" id="adminKey" class="admin-key-input" placeholder="Enter Admin Key"><button class="btn btn-approve" onclick="login()" style="width:100%">Login</button></div></div>
<div id="adminPanel" style="display:none">
<div class="stats-grid"><div class="stat-box"><h3 id="activeCount">-</h3><p>Active Users</p></div><div class="stat-box"><h3 id="totalCount">-</h3><p>Total UIDs</p></div></div>
<div class="card"><h2>✅ Approve New UID</h2><div class="input-group"><input type="text" id="uid" placeholder="UID (6 digits)" maxlength="6"><input type="text" id="name" placeholder="User Name"><select id="days"><option value="1">1 Day</option><option value="7">7 Days</option><option value="30" selected>30 Days</option><option value="90">90 Days</option><option value="365">1 Year</option></select><button class="btn btn-approve" id="approveBtn" onclick="approve()">✅ Approve UID</button></div></div>
<div class="card"><h2>📋 All Approved UIDs</h2><div style="overflow-x:auto"><table id="uidsTable"><thead><tr><th>UID</th><th>Name</th><th>Days</th><th>Expiry</th><th>Status</th><th>Action</th></tr></thead><tbody id="tableBody"><tr><td colspan="6">Loading...</td></tr></tbody></table></div></div>
</div>
</div>
<div id="popup"></div>
<script>
function showPopup(m,t){let p=document.getElementById('popup');p.innerHTML=`<div class="popup-message popup-${t}">${m}</div>`;setTimeout(()=>p.innerHTML='',3000)}
async function login(){let k=document.getElementById('adminKey').value;if(k==='hackernet123'){document.getElementById('login').style.display='none';document.getElementById('adminPanel').style.display='block';showPopup('Login Successful','success');loadData();setInterval(loadData,10000)}else{showPopup('Invalid Key','error')}}
async function loadData(){await loadUIDs()}
async function loadUIDs(){try{let r=await fetch('/api/list.js'),d=await r.json();let tbody=document.getElementById('tableBody');if(!d.uids||d.uids.length===0){tbody.innerHTML='<tr><td colspan="6">No UIDs</td></tr>';document.getElementById('activeCount').innerText='0';document.getElementById('totalCount').innerText='0';return}
tbody.innerHTML='';let active=0;for(let u of d.uids){let exp=new Date(u.expiry),isActive=exp>new Date();if(isActive)active++;let left=Math.ceil((exp-new Date())/(1000*60*60*24));let row=tbody.insertRow();row.innerHTML=`<td><strong>${u.uid}</strong></td><td>${escapeHtml(u.name)}</td><td>${u.days}</td><td>${exp.toLocaleString()} ${isActive?`<span style="color:green">(${left} days left)</span>`:'<span style="color:red">(Expired)</span>'}</td><td class="${isActive?'status-active':'status-expired'}">${isActive?'✅ Active':'❌ Expired'}</td><td><button class="btn btn-revoke" onclick="revoke('${u.uid}')">Revoke</button></td>`}
document.getElementById('activeCount').innerText=active;document.getElementById('totalCount').innerText=d.uids.length}catch(e){console.error(e);document.getElementById('tableBody').innerHTML='<tr><td colspan="6">Error loading</td></tr>'}}
async function approve(){let uid=document.getElementById('uid').value.trim(),name=document.getElementById('name').value.trim(),days=document.getElementById('days').value;if(!uid||uid.length!==6){showPopup('Enter 6-digit UID','error');return}
let btn=document.getElementById('approveBtn'),orig=btn.innerText;btn.innerHTML='Approving... <span class="loading"></span>';btn.disabled=true;try{let r=await fetch('/api/approve.js',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid,name:name||'User',days:parseInt(days),adminKey:'hackernet123'})}),d=await r.json();if(d.success){showPopup(`✅ UID ${uid} approved for ${days} days!`,'success');document.getElementById('uid').value='';document.getElementById('name').value='';loadData()}else{showPopup(`❌ Failed: ${d.error}`,'error')}}catch(e){showPopup('Network error','error')}finally{btn.innerHTML=orig;btn.disabled=false}}
async function revoke(uid){if(!confirm(`Revoke UID ${uid}?`))return;try{let r=await fetch('/api/revoke.js',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid,adminKey:'hackernet123'})}),d=await r.json();if(d.success){showPopup(`✅ UID ${uid} revoked`,'success');loadData()}else{showPopup('Revoke failed','error')}}catch(e){showPopup('Network error','error')}}
function escapeHtml(t){if(!t)return'N/A';let d=document.createElement('div');d.textContent=t;return d.innerHTML}
</script>
</body>
</html>
